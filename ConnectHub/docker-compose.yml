services:
  postgres:
    image: postgres:17
    container_name: connecthub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ConnectHubAuthDb
      # Note: MessageService uses ConnectHubMessageDb and ChatRoomService uses ConnectHubChatRoomDb
      # These are auto-created by EF Core migrations on startup
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - connecthub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./ConnectHub.AuthService
      dockerfile: Dockerfile
    container_name: connecthub-auth
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - connecthub-network
    restart: on-failure

  message-service:
    build:
      context: ./ConnectHub.MessageService
      dockerfile: Dockerfile
    container_name: connecthub-message
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - connecthub-network
    restart: on-failure

  chatroom-service:
    build:
      context: ./ConnectHub.ChatRoomService
      dockerfile: Dockerfile
    container_name: connecthub-chatroom
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - connecthub-network
    restart: on-failure

  hub-service:
    build:
      context: ./ConnectHub.HubService
      dockerfile: Dockerfile
    container_name: connecthub-hub
    ports:
      - "5006:5006"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      auth-service:
        condition: service_started
      message-service:
        condition: service_started
      chatroom-service:
        condition: service_started
    networks:
      - connecthub-network
    restart: on-failure

networks:
  connecthub-network:
    driver: bridge

volumes:
  postgres_data: